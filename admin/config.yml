backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "en"

collections:
  - name: "site"
    label: "সাইটের তথ্য"
    files:
      - name: "settings"
        label: "মূল তথ্য (ঠিকানা, ফোন, পরিসংখ্যান, কমিটি)"
        file: "site-data.json"
        fields:
          - label: "সংগঠনের তথ্য"
            name: "org"
            widget: "object"
            fields:
              - { label: "প্রতিষ্ঠার সাল", name: "founded_year", widget: "string" }
              - { label: "ঠিকানা", name: "address", widget: "string" }
              - { label: "ফোন নম্বর", name: "phone", widget: "string" }
              - { label: "ইমেইল", name: "email", widget: "string" }
              - { label: "ফেসবুক পেজ লিংক", name: "facebook", widget: "string" }

          - label: "পরিসংখ্যান (স্ট্যাটস)"
            name: "stats"
            widget: "object"
            fields:
              - { label: "বছরের পথচলা", name: "years", widget: "string" }
              - { label: "সক্রিয় সদস্য", name: "members", widget: "string" }
              - { label: "রক্তদান শিবির", name: "campaigns", widget: "string" }
              - { label: "উপকারভোগী পরিবার", name: "families", widget: "string" }

          - label: "কমিটি"
            name: "committee"
            widget: "object"
            fields:
              - label: "কার্যকরী কমিটি"
                name: "executive"
                widget: "list"
                label_singular: "সদস্য"
                fields:
                  - { label: "নাম", name: "name", widget: "string" }
                  - { label: "পদবি", name: "role", widget: "string" }
              - label: "উপদেষ্টা কমিটি"
                name: "advisory"
                widget: "list"
                label_singular: "সদস্য"
                fields:
                  - { label: "নাম", name: "name", widget: "string" }
                  - { label: "পদবি", name: "role", widget: "string" }

          - label: "ছবিঘর (গ্যালারি)"
            name: "gallery"
            widget: "list"
            label_singular: "ছবি"
            fields:
              - { label: "ছবি", name: "image", widget: "image", required: false }
              - { label: "ক্যাপশন", name: "caption", widget: "string" }

          - label: "রক্তদাতা তালিকা"
            name: "blood_donors"
            widget: "list"
            label_singular: "রক্তদাতা"
            fields:
              - { label: "নাম", name: "name", widget: "string" }
              - label: "রক্তের গ্রুপ"
                name: "blood_group"
                widget: "select"
                options: ["A+", "A-", "B+", "B-", "AB+", "AB-", "O+", "O-"]
              - { label: "ফোন নম্বর", name: "phone", widget: "string" }
              - { label: "এলাকা", name: "area", widget: "string" }

          - label: "আর্থিক প্রতিবেদন (বছরভিত্তিক)"
            name: "finance"
            widget: "list"
            label_singular: "বছর"
            fields:
              - { label: "সাল", name: "year", widget: "string" }
              - { label: "মোট আয়", name: "income", widget: "string" }
              - { label: "মোট ব্যয়", name: "expense", widget: "string" }
              - { label: "সংক্ষিপ্ত বিবরণ", name: "note", widget: "text" }

          - label: "সংবাদ ও আপডেট"
            name: "news"
            widget: "list"
            label_singular: "সংবাদ"
            fields:
              - { label: "তারিখ", name: "date", widget: "string" }
              - { label: "শিরোনাম", name: "title", widget: "string" }
              - { label: "বিস্তারিত", name: "body", widget: "text" }

          - label: "প্রতিষ্ঠাতার স্মরণে"
            name: "memorial"
            widget: "object"
            fields:
              - { label: "নাম", name: "name", widget: "string" }
              - { label: "জন্ম — মৃত্যু সাল", name: "years", widget: "string" }
              - { label: "জীবনী / স্মৃতিচারণ", name: "bio", widget: "text" }
